services:
  noctra:
    image: ${NOCTRA_DOCKER_IMAGE:-acyua/noctra:latest}
    pull_policy: ${NOCTRA_DOCKER_PULL_POLICY:-always}
    container_name: noctra
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "${NOCTRA_PORT:-4020}:8000"
    volumes:
      - ${NOCTRA_SOURCE_DIR:?set NOCTRA_SOURCE_DIR}:/source
      - ${NOCTRA_DIST_DIR:?set NOCTRA_DIST_DIR}:/dist
      - ${NOCTRA_DATA_DIR:-./data}:/app/data
    environment:
      SOURCE_DIR: /source
      DIST_DIR: /dist
      DB_PATH: /app/data/noctra.db
      NOCTRA_PROFILE: ${NOCTRA_PROFILE:-nas-docker}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  watchtower:
    image: ${NOCTRA_WATCHTOWER_IMAGE:-containrrr/watchtower:latest}
    container_name: noctra-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${NOCTRA_TIMEZONE:-Asia/Shanghai}
      HTTP_PROXY: ${NOCTRA_WATCHTOWER_HTTP_PROXY:-}
      HTTPS_PROXY: ${NOCTRA_WATCHTOWER_HTTPS_PROXY:-}
      NO_PROXY: ${NOCTRA_WATCHTOWER_NO_PROXY:-}
      http_proxy: ${NOCTRA_WATCHTOWER_HTTP_PROXY:-}
      https_proxy: ${NOCTRA_WATCHTOWER_HTTPS_PROXY:-}
      no_proxy: ${NOCTRA_WATCHTOWER_NO_PROXY:-}
    command:
      - --interval
      - ${NOCTRA_WATCHTOWER_INTERVAL:-300}
      - --cleanup
      - --label-enable
