version: '3.8'

services:
  noctra:
    build: .
    container_name: noctra
    ports:
      - "8000:8000"
    volumes:
      # 挂载源目录（存放待整理的视频）
      - ${SOURCE_DIR:-/path/to/source}:/source
      # 挂载目标目录（整理后的文件）
      - ${DIST_DIR:-/path/to/dist}:/dist
      # 数据持久化
      - ./data:/app/data
    environment:
      - SOURCE_DIR=/source
      - DIST_DIR=/dist
      - DB_PATH=/app/data/noctra.db
    restart: unless-stopped
