services:
  noctra:
    build: .
    container_name: noctra
    ports:
      - "${NOCTRA_PORT:-8888}:8000"
    volumes:
      - ${NOCTRA_SOURCE_DIR:?set NOCTRA_SOURCE_DIR}:/source
      - ${NOCTRA_DIST_DIR:?set NOCTRA_DIST_DIR}:/dist
      - ${NOCTRA_DATA_DIR:-./data}:/app/data
    environment:
      SOURCE_DIR: /source
      DIST_DIR: /dist
      DB_PATH: /app/data/noctra.db
      NOCTRA_PROFILE: ${NOCTRA_PROFILE:-docker}
    restart: unless-stopped
