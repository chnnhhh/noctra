services:
  noctra:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${NOCTRA_PYTHON_BASE_IMAGE:-python:3.11-slim}
        NOCTRA_PIP_INDEX_URL: ${NOCTRA_PIP_INDEX_URL:-}
        NOCTRA_PIP_TRUSTED_HOST: ${NOCTRA_PIP_TRUSTED_HOST:-}
    container_name: noctra
    ports:
      - "${NOCTRA_PORT:-4020}:8000"
    volumes:
      - ${NOCTRA_SOURCE_DIR:?set NOCTRA_SOURCE_DIR}:/source
      - ${NOCTRA_DIST_DIR:?set NOCTRA_DIST_DIR}:/dist
      - ${NOCTRA_DATA_DIR:-./data}:/app/data
    environment:
      SOURCE_DIR: /source
      DIST_DIR: /dist
      DB_PATH: /app/data/noctra.db
      NOCTRA_PROFILE: ${NOCTRA_PROFILE:-docker}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    restart: unless-stopped
